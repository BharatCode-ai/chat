name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:latest detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --redact=100 \
              --exit-code=1
