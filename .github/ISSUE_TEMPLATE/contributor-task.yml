name: Contributor Task
description: Scoped task for contributors.
title: "[Task]: "
labels: ["help wanted"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be changed?
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should not be changed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks or behavior.
    validations:
      required: true
